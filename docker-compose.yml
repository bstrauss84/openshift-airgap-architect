version: "3.9"
services:
  backend:
    image: localhost/openshift-airgap-architect-backend:latest
    build:
      context: .
      dockerfile: backend/Containerfile
    environment:
      - PORT=4000
      - DATA_DIR=/data
      # REGISTRY_AUTH_FILE is intentionally NOT set here. oc-mirror v2's internal
      # distribution/distribution storage registry reads REGISTRY_* env vars as YAML
      # registry config parameters — setting it to a JSON auth file path causes a
      # panic on startup. Auth is passed via --authfile flag by the backend instead.
      - MOCK_MODE=${MOCK_MODE:-false}
      - FEEDBACK_MODE=${FEEDBACK_MODE:-github}
      - APP_REPO=${APP_REPO:-bstrauss84/openshift-airgap-architect}
      - APP_BRANCH=${APP_BRANCH:-main}
    volumes:
      - backend-data:/data
    ports:
      - "127.0.0.1:4000:4000"
    stop_grace_period: 3s
    stop_signal: SIGTERM
  frontend:
    image: localhost/openshift-airgap-architect-frontend:latest
    build:
      context: ./frontend
      dockerfile: Containerfile
    environment:
      # For remote access, set to URL reachable from the client (e.g. http://<host>:4000). See README "Same-host vs remote access".
      - VITE_API_BASE=http://localhost:4000
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend
    stop_grace_period: 3s
    stop_signal: SIGTERM
# To mount external storage for large oc-mirror archives (50–200+ GB per OCP release + operators),
# create a compose.override.yml in the same directory as this file:
#
#   services:
#     backend:
#       volumes:
#         - /path/to/large-drive/oc-mirror:/data/oc-mirror
#
# Then restart: podman compose down --remove-orphans && podman compose up --build -d
# (data in backend-data volume is preserved unless you pass -v to compose down)
volumes:
  backend-data:
