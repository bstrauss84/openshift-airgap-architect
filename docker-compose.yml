version: "3.9"
services:
  backend:
    image: localhost/openshift-airgap-architect-backend:latest
    build:
      context: ./backend
      dockerfile: Containerfile
    environment:
      - PORT=4000
      - DATA_DIR=/data
      - REGISTRY_AUTH_FILE=/data/registry-auth.json
      - MOCK_MODE=${MOCK_MODE:-false}
      # Optional: use a custom oc-mirror binary (e.g. native aarch64 on Apple Silicon):
      # - OC_MIRROR_BIN=/opt/tools/oc-mirror
    volumes:
      - backend-data:/data
      # Optional: mount a native oc-mirror binary for Operators scan (e.g. Apple Silicon):
      # - ./path/to/oc-mirror:/opt/tools/oc-mirror:ro
    ports:
      - "127.0.0.1:4000:4000"
    stop_grace_period: 5s
    stop_signal: SIGTERM
  frontend:
    image: localhost/openshift-airgap-architect-frontend:latest
    build:
      context: ./frontend
      dockerfile: Containerfile
    environment:
      - VITE_API_BASE=http://localhost:4000
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend
    stop_grace_period: 5s
    stop_signal: SIGTERM
volumes:
  backend-data:
