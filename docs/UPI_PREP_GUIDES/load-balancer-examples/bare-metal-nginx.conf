# nginx Configuration for Bare Metal / vSphere UPI
#
# IMPORTANT: This is an EXAMPLE template only. You MUST customize:
# - IP addresses for your bootstrap, control plane, and worker nodes
# - Cluster name and base domain to match your install-config.yaml
# - Port numbers if you have conflicts with existing services
#
# DO NOT use this template verbatim in production without customization.
#
# VARIABLE PLACEHOLDERS (replace these):
# {{BOOTSTRAP_IP}} - Bootstrap node IP address
# {{CONTROL_PLANE_IP_1}}, {{CONTROL_PLANE_IP_2}}, {{CONTROL_PLANE_IP_3}} - Control plane IPs
# {{WORKER_IP_1}}, {{WORKER_IP_2}}, ... - Worker node IPs

# Place this file in: /etc/nginx/nginx.conf
# Or include it from main nginx.conf: include /etc/nginx/conf.d/openshift-lb.conf;

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

stream {
    log_format basic '$remote_addr [$time_local] '
                     '$protocol $status $bytes_sent $bytes_received '
                     '$session_time "$upstream_addr"';

    access_log /var/log/nginx/access.log basic;

    #-----------------------------------------------------------------
    # Kubernetes API (port 6443)
    # Used by: kubectl, oc, openshift-install
    # Backends: Bootstrap (during install only), Control plane nodes
    #-----------------------------------------------------------------
    upstream api {
        # Remove bootstrap server after installation completes
        server {{BOOTSTRAP_IP}}:6443 max_fails=3 fail_timeout=30s;
        server {{CONTROL_PLANE_IP_1}}:6443 max_fails=3 fail_timeout=30s;
        server {{CONTROL_PLANE_IP_2}}:6443 max_fails=3 fail_timeout=30s;
        server {{CONTROL_PLANE_IP_3}}:6443 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 6443;
        proxy_pass api;
        proxy_timeout 10m;
        proxy_connect_timeout 10s;
    }

    #-----------------------------------------------------------------
    # Machine Config Server (port 22623)
    # Used by: Nodes to fetch ignition configs during boot
    # Backends: Bootstrap (during install only), Control plane nodes
    #-----------------------------------------------------------------
    upstream machine-config-server {
        # Remove bootstrap server after installation completes
        server {{BOOTSTRAP_IP}}:22623 max_fails=3 fail_timeout=30s;
        server {{CONTROL_PLANE_IP_1}}:22623 max_fails=3 fail_timeout=30s;
        server {{CONTROL_PLANE_IP_2}}:22623 max_fails=3 fail_timeout=30s;
        server {{CONTROL_PLANE_IP_3}}:22623 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 22623;
        proxy_pass machine-config-server;
        proxy_timeout 10m;
        proxy_connect_timeout 10s;
    }

    #-----------------------------------------------------------------
    # Ingress HTTP (port 80)
    # Used by: Application routes, console, oauth
    # Backends: Worker nodes (or control plane if no workers)
    #-----------------------------------------------------------------
    upstream ingress-http {
        # Add/remove worker servers as needed
        server {{WORKER_IP_1}}:80 max_fails=3 fail_timeout=30s;
        server {{WORKER_IP_2}}:80 max_fails=3 fail_timeout=30s;
        # If using control plane for ingress (no workers):
        # server {{CONTROL_PLANE_IP_1}}:80 max_fails=3 fail_timeout=30s;
        # server {{CONTROL_PLANE_IP_2}}:80 max_fails=3 fail_timeout=30s;
        # server {{CONTROL_PLANE_IP_3}}:80 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        proxy_pass ingress-http;
        proxy_timeout 10m;
        proxy_connect_timeout 10s;
    }

    #-----------------------------------------------------------------
    # Ingress HTTPS (port 443)
    # Used by: Application routes, console, oauth
    # Backends: Worker nodes (or control plane if no workers)
    #-----------------------------------------------------------------
    upstream ingress-https {
        # Add/remove worker servers as needed
        server {{WORKER_IP_1}}:443 max_fails=3 fail_timeout=30s;
        server {{WORKER_IP_2}}:443 max_fails=3 fail_timeout=30s;
        # If using control plane for ingress (no workers):
        # server {{CONTROL_PLANE_IP_1}}:443 max_fails=3 fail_timeout=30s;
        # server {{CONTROL_PLANE_IP_2}}:443 max_fails=3 fail_timeout=30s;
        # server {{CONTROL_PLANE_IP_3}}:443 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 443;
        proxy_pass ingress-https;
        proxy_timeout 10m;
        proxy_connect_timeout 10s;
    }
}

# POST-INSTALLATION STEPS:
#
# 1. Test nginx configuration:
#    nginx -t
#
# 2. Start/enable nginx:
#    systemctl start nginx
#    systemctl enable nginx
#
# 3. After bootstrap completes (openshift-install wait-for bootstrap-complete):
#    - Comment out or remove bootstrap server lines from api and machine-config-server upstreams
#    - Reload nginx: systemctl reload nginx
#
# 4. Verify connectivity:
#    - API: curl -k https://api.{{CLUSTER_NAME}}.{{BASE_DOMAIN}}:6443/healthz
#    - Ingress: curl -k https://console-openshift-console.apps.{{CLUSTER_NAME}}.{{BASE_DOMAIN}}
#
# 5. Monitor logs:
#    - journalctl -u nginx -f
#    - tail -f /var/log/nginx/error.log
#    - tail -f /var/log/nginx/access.log
#
# 6. Firewall rules (if needed):
#    firewall-cmd --permanent --add-port=6443/tcp
#    firewall-cmd --permanent --add-port=22623/tcp
#    firewall-cmd --permanent --add-port=80/tcp
#    firewall-cmd --permanent --add-port=443/tcp
#    firewall-cmd --reload
