# HAProxy Configuration for Bare Metal / vSphere UPI
#
# IMPORTANT: This is an EXAMPLE template only. You MUST customize:
# - IP addresses for your bootstrap, control plane, and worker nodes
# - Cluster name and base domain to match your install-config.yaml
# - Port numbers if you have conflicts with existing services
# - Health check intervals based on your network characteristics
#
# DO NOT use this template verbatim in production without customization.
#
# VARIABLE PLACEHOLDERS (replace these):
# {{CLUSTER_NAME}} - Your cluster name (e.g., "ocp-prod")
# {{BASE_DOMAIN}} - Your base domain (e.g., "example.com")
# {{BOOTSTRAP_IP}} - Bootstrap node IP address
# {{CONTROL_PLANE_IP_1}}, {{CONTROL_PLANE_IP_2}}, {{CONTROL_PLANE_IP_3}} - Control plane IPs
# {{WORKER_IP_1}}, {{WORKER_IP_2}}, ... - Worker node IPs
# {{LOAD_BALANCER_IP}} - Load balancer's external IP (for binding)

global
    log         127.0.0.1 local2
    chroot      /var/lib/haproxy
    pidfile     /var/run/haproxy.pid
    maxconn     4000
    user        haproxy
    group       haproxy
    daemon
    stats socket /var/lib/haproxy/stats

defaults
    mode                    http
    log                     global
    option                  httplog
    option                  dontlognull
    option http-server-close
    option forwardfor       except 127.0.0.0/8
    option                  redispatch
    retries                 3
    timeout http-request    10s
    timeout queue           1m
    timeout connect         10s
    timeout client          1m
    timeout server          1m
    timeout http-keep-alive 10s
    timeout check           10s
    maxconn                 3000

#---------------------------------------------------------------------
# Kubernetes API (port 6443)
# Used by: kubectl, oc, openshift-install
# Backends: Bootstrap (during install only), Control plane nodes
#---------------------------------------------------------------------
frontend api
    bind {{LOAD_BALANCER_IP}}:6443
    default_backend api
    mode tcp
    option tcplog

backend api
    balance source
    mode tcp
    option ssl-hello-chk
    # Remove bootstrap server after installation completes
    server bootstrap {{BOOTSTRAP_IP}}:6443 check
    server master-0 {{CONTROL_PLANE_IP_1}}:6443 check
    server master-1 {{CONTROL_PLANE_IP_2}}:6443 check
    server master-2 {{CONTROL_PLANE_IP_3}}:6443 check

#---------------------------------------------------------------------
# Machine Config Server (port 22623)
# Used by: Nodes to fetch ignition configs during boot
# Backends: Bootstrap (during install only), Control plane nodes
#---------------------------------------------------------------------
frontend machine-config-server
    bind {{LOAD_BALANCER_IP}}:22623
    default_backend machine-config-server
    mode tcp
    option tcplog

backend machine-config-server
    balance source
    mode tcp
    # Remove bootstrap server after installation completes
    server bootstrap {{BOOTSTRAP_IP}}:22623 check
    server master-0 {{CONTROL_PLANE_IP_1}}:22623 check
    server master-1 {{CONTROL_PLANE_IP_2}}:22623 check
    server master-2 {{CONTROL_PLANE_IP_3}}:22623 check

#---------------------------------------------------------------------
# Ingress HTTP (port 80)
# Used by: Application routes, console, oauth
# Backends: Worker nodes (or control plane if no workers)
#---------------------------------------------------------------------
frontend ingress-http
    bind {{LOAD_BALANCER_IP}}:80
    default_backend ingress-http
    mode tcp
    option tcplog

backend ingress-http
    balance source
    mode tcp
    # Add/remove worker servers as needed
    server worker-0 {{WORKER_IP_1}}:80 check
    server worker-1 {{WORKER_IP_2}}:80 check
    # If using control plane for ingress (no workers):
    # server master-0 {{CONTROL_PLANE_IP_1}}:80 check
    # server master-1 {{CONTROL_PLANE_IP_2}}:80 check
    # server master-2 {{CONTROL_PLANE_IP_3}}:80 check

#---------------------------------------------------------------------
# Ingress HTTPS (port 443)
# Used by: Application routes, console, oauth
# Backends: Worker nodes (or control plane if no workers)
#---------------------------------------------------------------------
frontend ingress-https
    bind {{LOAD_BALANCER_IP}}:443
    default_backend ingress-https
    mode tcp
    option tcplog

backend ingress-https
    balance source
    mode tcp
    option ssl-hello-chk
    # Add/remove worker servers as needed
    server worker-0 {{WORKER_IP_1}}:443 check
    server worker-1 {{WORKER_IP_2}}:443 check
    # If using control plane for ingress (no workers):
    # server master-0 {{CONTROL_PLANE_IP_1}}:443 check
    # server master-1 {{CONTROL_PLANE_IP_2}}:443 check
    # server master-2 {{CONTROL_PLANE_IP_3}}:443 check

#---------------------------------------------------------------------
# HAProxy Stats Interface (optional)
# Access at: http://{{LOAD_BALANCER_IP}}:9000/stats
#---------------------------------------------------------------------
listen stats
    bind {{LOAD_BALANCER_IP}}:9000
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s
    stats admin if LOCALHOST

# POST-INSTALLATION STEPS:
#
# 1. After bootstrap completes (openshift-install wait-for bootstrap-complete):
#    - Comment out or remove bootstrap server lines from api and machine-config-server backends
#    - Reload HAProxy: systemctl reload haproxy
#
# 2. Verify health checks:
#    - Check HAProxy stats: http://{{LOAD_BALANCER_IP}}:9000/stats
#    - All control plane servers should show green (UP)
#    - All worker servers should show green (UP)
#
# 3. Test connectivity:
#    - API: curl -k https://api.{{CLUSTER_NAME}}.{{BASE_DOMAIN}}:6443/healthz
#    - Ingress: curl -k https://console-openshift-console.apps.{{CLUSTER_NAME}}.{{BASE_DOMAIN}}
#
# 4. Monitor logs:
#    - journalctl -u haproxy -f
#    - /var/log/haproxy.log (if configured)
