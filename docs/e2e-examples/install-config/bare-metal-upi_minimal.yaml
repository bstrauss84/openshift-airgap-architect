# Bare metal UPI: platform must be only "none" per 4.20 doc (no platform.baremetal; no controlPlane/compute platform).
# Source: installing on bare metal user-provisioned infrastructure, section 2.1.12.1.
# https://docs.redhat.com/en/documentation/openshift_container_platform/4.20/html/installing_on_bare_metal/user-provisioned-infrastructure
apiVersion: v1
baseDomain: example.com
metadata:
  name: airgap-cluster
compute:
  - name: worker
    replicas: 0
controlPlane:
  name: master
  replicas: 3
networking:
  networkType: OVNKubernetes
  machineNetwork:
    - cidr: 10.90.0.0/24
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  serviceNetwork:
    - 172.30.0.0/16
platform:
  none: {}
pullSecret: '{"auths":{}}'
sshKey: ''
