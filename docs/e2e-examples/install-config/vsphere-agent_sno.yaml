# SNO (Single Node OpenShift) install-config for VMware vSphere Agent-Based Installer (4.20).
# Source: Red Hat 4.20 "Installation configuration parameters for the Agent-based Installer" Ch 9.1,
#   https://docs.redhat.com/en/documentation/openshift_container_platform/4.20/html/installing_an_on-premise_cluster_with_the_agent-based_installer/installation-config-parameters-agent
# SNO topology: 1 control-plane node, 0 workers → platform.none (no VIPs required).
# Per §1.11: when masters=1 and workers=0, platform must be none for Agent-based installs.
apiVersion: v1
baseDomain: example.com
metadata:
  name: airgap-cluster
compute:
  - name: worker
    replicas: 0
controlPlane:
  name: master
  replicas: 1
networking:
  networkType: OVNKubernetes
  machineNetwork:
    - cidr: 10.90.0.0/24
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  serviceNetwork:
    - 172.30.0.0/16
platform:
  none: {}
pullSecret: '{"auths":{}}'
sshKey: ''
