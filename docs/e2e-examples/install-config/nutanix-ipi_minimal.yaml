# Synthetic — align with OpenShift 4.20 Nutanix IPI install-config (prismCentral.endpoint.*, apiVIP, ingressVIP, credentialsMode Manual).
# Docs: installing_on_nutanix + installation-config-parameters-nutanix (§1.4 CCO Manual).
# Sources: https://docs.redhat.com/en/documentation/openshift_container_platform/4.20/html/installing_on_nutanix/
apiVersion: v1
credentialsMode: Manual
publish: External
baseDomain: example.com
metadata:
  name: airgap-cluster
compute:
  - name: worker
    replicas: 3
    architecture: amd64
    platform:
      nutanix: {}
controlPlane:
  name: master
  replicas: 3
  architecture: amd64
  platform:
    nutanix: {}
networking:
  networkType: OVNKubernetes
  machineNetwork:
    - cidr: 10.90.0.0/24
  clusterNetwork:
    - cidr: 10.128.0.0/14
      hostPrefix: 23
  serviceNetwork:
    - 172.30.0.0/16
platform:
  nutanix:
    apiVIP: 10.90.0.10
    ingressVIP: 10.90.0.11
    prismCentral:
      endpoint:
        address: prism-central.example.com
        port: 9440
      username: ''
      password: ''
    subnetUUIDs:
      - subnet-uuid-placeholder
pullSecret: '{"auths":{}}'
sshKey: ''
imageDigestSources:
  - source: quay.io/openshift-release-dev/ocp-release
    mirrors:
      - registry.local:5000/ocp-release
  - source: quay.io/openshift-release-dev/ocp-v4.0-art-dev
    mirrors:
      - registry.local:5000/ocp-v4.0-art-dev
