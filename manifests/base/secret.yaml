apiVersion: v1
kind: Secret
metadata:
  name: airgap-architect-secrets
  labels:
    app: airgap-architect
    app.kubernetes.io/name: airgap-architect-secrets
    app.kubernetes.io/part-of: airgap-architect
type: Opaque
stringData:
  # ------------------------------------------------------------------
  # USER MUST POPULATE THESE VALUES BEFORE DEPLOYING
  # ------------------------------------------------------------------
  #
  # Red Hat pull secret (JSON from https://console.redhat.com/openshift/install/pull-secret).
  # Used by oc-mirror to authenticate to registry.redhat.io and quay.io.
  # Paste the full JSON content of your pull secret here.
  pull-secret.json: ""
  #
  # Mirror registry credentials (JSON).
  # If you mirror images to a private registry, add its auth entry here.
  # Format: {"auths":{"my-registry.example.com:5000":{"auth":"base64..."}}}
  registry-auth.json: ""
