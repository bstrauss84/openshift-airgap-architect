apiVersion: apps/v1
kind: Deployment
metadata:
  name: oaa-frontend
  labels:
    app: oaa-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oaa-frontend
  template:
    metadata:
      labels:
        app: oaa-frontend
    spec:
      containers:
        - name: frontend
          image: oaa-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
