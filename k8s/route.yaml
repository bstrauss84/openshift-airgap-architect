# Single Ingress: /api -> backend, / -> frontend on same host
# OpenShift 4.18+ supports Ingress; creates Route(s) behind the scenes.
# TLS enabled via spec.tls for HTTPS through the OpenShift router.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: oaa
  labels:
    app: oaa
spec:
  tls:
    - {}
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: oaa-backend
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: oaa-frontend
                port:
                  number: 8080
