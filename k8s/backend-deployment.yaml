apiVersion: apps/v1
kind: Deployment
metadata:
  name: oaa-backend
  labels:
    app: oaa-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oaa-backend
  template:
    metadata:
      labels:
        app: oaa-backend
    spec:
      containers:
        - name: backend
          image: openshift-airgap-architect-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: PORT
              value: "4000"
            - name: NODE_ENV
              value: production
            # DATA_DIR defaults to /tmp/airgap-architect-data (writable under OpenShift non-root)
            # For persistence, mount a PVC and set: DATA_DIR=/data
            - name: DATA_DIR
              value: /tmp/airgap-architect-data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
