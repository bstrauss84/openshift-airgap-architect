apiVersion: apps/v1
kind: Deployment
metadata:
  name: oaa-backend
  labels:
    app: oaa-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oaa-backend
  template:
    metadata:
      labels:
        app: oaa-backend
    spec:
      containers:
        - name: backend
          image: oaa-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: PORT
              value: "4000"
            - name: NODE_ENV
              value: production
            - name: DATA_DIR
              value: /data
            - name: REGISTRY_AUTH_FILE
              value: /data/registry-auth.json
            - name: MOCK_MODE
              value: "false"
          volumeMounts:
            - name: backend-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: backend-data
          persistentVolumeClaim:
            claimName: oaa-backend-data
